name: homeflix-prod

# --------------------------------------------------------------------------- #
# HomeFlix Family V1 — compose de producción (VPS Ubuntu).
#
# Servicios Family V1 + motor de media (fase incremental):
#   - postgres : base de datos (no se expone al host)
#   - client   : monolito Next.js (apps/client) con Prisma + migrate deploy
#   - nginx    : reverse proxy público (TLS se añade más adelante)
#   - jellyfin : biblioteca / metadata / streaming / transcodificación (solo
#     integración de infra en esta fase; la UI y auth siguen en HomeFlix).
#
# Explícitamente NO incluye Directus ni la API Fastify legada (V2).
# Usar `docker compose -f docker-compose.prod.yml ...` (NO combinar con el
# docker-compose.dev.yml).
# --------------------------------------------------------------------------- #

services:
  postgres:
    image: postgres:16-alpine
    container_name: homeflix-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB requerido}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER requerido}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}"
    volumes:
      - homeflix-postgres-data:/var/lib/postgresql/data
    # En producción Postgres NO se expone al host: solo el cliente dentro de la
    # red interna de Docker lo alcanza por el nombre del servicio.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - homeflix-internal

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client.prod
    image: homeflix/client:prod
    container_name: homeflix-prod-client
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Prisma + app
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL requerido}"
      FAMILY_JWT_SECRET: "${FAMILY_JWT_SECRET:?FAMILY_JWT_SECRET requerido (min 32 chars)}"
      # Debe coincidir con el mount de `homeflix-media` (misma ruta absoluta en el client).
      FAMILY_STORAGE_ROOT: "${FAMILY_STORAGE_ROOT:-/repo/apps/client/public/storage}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Persistencia de media (videos, posters, thumbnails). Montamos el volumen
      # en la ruta de FAMILY_STORAGE_ROOT (p. ej. public/storage) para que la app
      # escriba y lea archivos; en producción Nginx sirve /storage/thumbnails|posters
      # desde el mismo volumen y el streaming sigue en /api/family/media.
      - homeflix-media:/repo/apps/client/public/storage
    expose:
      - "3000"
    networks:
      - homeflix-internal
    # Sobreescribe el HEALTHCHECK de la imagen: puerto explícito (evita sustitución
    # rara de ${PORT} en build) y más margen en cold start (migrate + servidor Node).
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "--tries=1",
          "--timeout=5",
          "http://127.0.0.1:3000/api/family/healthz"
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 180s

  nginx:
    image: nginx:1.27-alpine
    container_name: homeflix-prod-nginx
    restart: unless-stopped
    depends_on:
      client:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Mismo volumen que el client: servir posters/thumbnails aquí sin pasar por Next.
      - homeflix-media:/var/www/homeflix-media:ro
      # Carpetas listas para certbot / certificados TLS (vacías por defecto).
      - homeflix-nginx-certs:/etc/letsencrypt
      - homeflix-nginx-webroot:/var/www/certbot
    networks:
      - homeflix-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "--timeout=3", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Jellyfin: motor de media interno (misma red que client/postgres). Fase 1:
  # solo servicio + volúmenes; HomeFlix no llama aún a la API de Jellyfin.
  # Acceso inicial al wizard: http://IP_DEL_SERVIDOR:8096 (puerto publicado abajo).
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: homeflix-prod-jellyfin
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - homeflix-jellyfin-config:/config
      - homeflix-jellyfin-cache:/cache
      # Mismo volumen que el client; solo lectura: metadata y transcodes van en
      # /config y /cache. Ajustar permisos en host/volumen si Jellyfin no ve archivos.
      - homeflix-media:/media:ro
    ports:
      # Exposición temporal solo para configuración inicial (wizard). Cerrar o
      # sustituir por reverse proxy + TLS cuando la integración esté lista.
      - "${JELLYFIN_HTTP_PORT:-8096}:8096"
    expose:
      - "8096"
    networks:
      - homeflix-internal
    # HEALTHCHECK heredado de la imagen (curl → /health).

networks:
  homeflix-internal:
    driver: bridge

volumes:
  homeflix-postgres-data:
    name: homeflix-postgres-data
  homeflix-media:
    name: homeflix-media
  homeflix-nginx-certs:
    name: homeflix-nginx-certs
  homeflix-nginx-webroot:
    name: homeflix-nginx-webroot
  homeflix-jellyfin-config:
    name: homeflix-jellyfin-config
  homeflix-jellyfin-cache:
    name: homeflix-jellyfin-cache
