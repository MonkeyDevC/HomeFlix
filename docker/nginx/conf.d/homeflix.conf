# server {
#     listen       443 ssl http2;
#     listen       [::]:443 ssl http2;
#     server_name  homeflix.example.com;
#
#     ssl_certificate     /etc/letsencrypt/live/homeflix.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/homeflix.example.com/privkey.pem;
#
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache shared:SSL:10m;
#     ssl_session_timeout 10m;
#
#     # Reutilizar los mismos `location` del bloque HTTP. Incluirlos aquí cuando
#     # se active TLS, y cambiar el primer server { listen 80 } por un 301 a
#     # https://$host$request_uri con excepción de /.well-known/acme-challenge/.
# }
