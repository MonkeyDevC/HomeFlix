# HomeFlix Family V1 — server block (HTTP).
#
# Este archivo hace reverse proxy al contenedor `client` (Next.js en :3000) y
# se comporta correctamente con:
#   * uploads de video hasta 300 MiB (client_max_body_size se define en nginx.conf)
#   * transcodificaciones que pueden tardar minutos (proxy_read_timeout 900s)
#   * streaming HTTP por Range (proxy_buffering desactivado para /api/family/media/)
#
# TLS:
#   - El bloque `server { listen 443 ssl ... }` está comentado al final y listo
#     para activarse cuando tengamos certificados (Let's Encrypt vía certbot,
#     por ejemplo un sidecar que escriba en /etc/letsencrypt montado en nginx).
#   - El `location /.well-known/acme-challenge/` ya deja pasar el challenge ACME
#     sin redirigir, así certbot puede emitir el cert sin bajar nginx.
#   - Cuando TLS esté activo, convertir el primer `server` en un redirect 301
#     http→https.

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # Permitir el challenge HTTP-01 de Let's Encrypt sin proxy ni redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Healthcheck propio de nginx (no pasa al upstream). Lo usamos desde el
    # HEALTHCHECK del contenedor nginx en docker-compose.prod.yml.
    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"homeflix-nginx"}';
    }

    # Consola legacy /dev (Next): en producción detrás de este Nginx no debe ser alcanzable.
    location = /dev {
        return 404;
    }
    location ^~ /dev/ {
        return 404;
    }

    # --- Archivos públicos de media en volumen (no pasan por Next) ---
    #
    # El client monta homeflix-media en .../public/storage/{thumbnails,posters,videos}.
    # Nginx lee el mismo volumen en /var/www/homeflix-media/ y sirve solo imágenes.
    # Los videos NO deben ser públicos por URL estática; el playback va por
    # /api/family/media/<id> (location dedicada más abajo).
    location ^~ /storage/videos/ {
        access_log off;
        return 404;
    }

    location ^~ /storage/thumbnails/ {
        alias /var/www/homeflix-media/thumbnails/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        # Con `alias`, no usar try_files $uri (=404): $uri sigue siendo la URI HTTP,
        # no la ruta en disco; Nginx ya devuelve 404 si el fichero no existe.
    }

    location ^~ /storage/posters/ {
        alias /var/www/homeflix-media/posters/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # --- Playback de media: streaming con Range, sin buffering completo ---
    #
    # /api/family/media/<id> devuelve 206 Partial Content con Content-Range.
    # Si nginx buffereara la respuesta perdería la semántica de streaming
    # (esperaría a tener todo el chunk antes de enviarlo al cliente) y los
    # seeks del <video> se sentirían lentos. Desactivamos buffering solo acá.
    location ^~ /api/family/media/ {
        proxy_pass http://homeflix_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # El streaming puede durar lo que dure el video; mantenemos lectura larga.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Nginx pasa Range tal cual; explicitarlo evita sorpresas con filtros.
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # --- Admin content API (lista POST/GET + /[id] + media/transcode bajo mismo prefijo) ---
    #
    # Importante: el prefijo termina en `.../content` **sin** slash final obligatorio.
    # Si usáramos solo `.../content/`, las peticiones a `/api/family/admin/content`
    # no matchean y caen en `location /`; Next puede responder 301→slash y el
    # cliente reintenta en bucle (ERR_TOO_MANY_REDIRECTS), además el POST puede
    # degradarse tras redirects 301.
    #
    # `proxy_pass` sin URI adicional reenvía la ruta tal cual al upstream.
    location ^~ /api/family/admin/content {
        proxy_pass http://homeflix_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    900s;
        proxy_read_timeout    900s;
    }

    # Login JSON (POST): límite básico anti brute-force. Debe ir antes del `^~ /api/` genérico
    # (el `=` tiene prioridad; el orden solo ayuda a lectura humana).
    location = /api/family/auth/login {
        limit_req zone=hf_family_login burst=8 nodelay;
        limit_req_status 429;

        proxy_pass http://homeflix_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- Resto de `/api/*` (catalog, me, watchlist, etc.); timeouts estándar ---
    location ^~ /api/ {
        proxy_pass http://homeflix_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- Páginas y assets Next (las rutas /api/* ya tienen bloques dedicados arriba) ---
    location / {
        proxy_pass http://homeflix_client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

