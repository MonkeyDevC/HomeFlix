# HomeFlix Family V1 — nginx.conf (reverse proxy público).
# Foco: limites de upload, streaming por Range, timeouts de transcodificación,
# headers proxy estándar. TLS se añade editando conf.d/homeflix.conf cuando
# estén los certificados.

user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  75s;
    types_hash_max_size 2048;
    server_tokens off;

    # Rate limit por IP para login (ver `conf.d/homeflix.conf`, location exacta).
    # Valores conservadores: ~5 intentos/minuto sostenidos + ráfagas cortas (burst).
    limit_req_zone $binary_remote_addr zone=hf_family_login:10m rate=5r/m;

    # --------- Compresión para respuestas HTML/JSON/JS/CSS ---------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --------- Límites globales ---------
    # Alineado con `proxyClientMaxBodySize=300mb` de Next.js + margen.
    client_max_body_size        310m;
    client_body_buffer_size     256k;
    client_body_timeout         900s;
    client_header_timeout       60s;
    send_timeout                900s;

    # --------- Upstream: contenedor Next.js ---------
    upstream homeflix_client {
        server client:3000;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
