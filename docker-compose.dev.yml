name: homeflix

services:
  postgres:
    image: postgres:16-alpine
    container_name: homeflix-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-homeflix}"
      POSTGRES_USER: "${POSTGRES_USER:-homeflix}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-homeflix_dev_password}"
    volumes:
      - homeflix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  directus:
    image: directus/directus:11
    container_name: homeflix-directus
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: "0.0.0.0"
      PORT: "8055"
      PUBLIC_URL: "${CMS_PUBLIC_URL:-http://localhost:8055}"
      KEY: "${DIRECTUS_KEY:-homeflix-dev-key-change-before-production}"
      SECRET: "${DIRECTUS_SECRET:-homeflix-dev-secret-change-before-production}"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "${POSTGRES_DB:-homeflix}"
      DB_USER: "${POSTGRES_USER:-homeflix}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-homeflix_dev_password}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@homeflix.local}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-homeflix-admin-password}"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${CLIENT_ORIGIN:-http://localhost:3000},${API_PUBLIC_URL:-http://localhost:4000}"
      TELEMETRY: "false"
    volumes:
      - ./apps/cms/uploads:/directus/uploads
      - ./apps/cms/extensions:/directus/extensions
      - ./apps/cms/snapshot:/directus/snapshot

  api:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: homeflix-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      HOMEFLIX_ENV: "${HOMEFLIX_ENV:-development}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      API_HOST: "0.0.0.0"
      API_PORT: "4000"
      API_PUBLIC_URL: "${API_PUBLIC_URL:-http://localhost:4000}"
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:-http://localhost:3000}"
      CMS_PUBLIC_URL: "${CMS_PUBLIC_URL:-http://localhost:8055}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-homeflix}:${POSTGRES_PASSWORD:-homeflix_dev_password}@postgres:5432/${POSTGRES_DB:-homeflix}"
      HOMEFLIX_JWT_SECRET: "${HOMEFLIX_JWT_SECRET:-local-dev-homflix-jwt-secret-minimum-32-characters}"
      MUX_TOKEN_ID: "${MUX_TOKEN_ID:-}"
      MUX_TOKEN_SECRET: "${MUX_TOKEN_SECRET:-}"
      MUX_WEBHOOK_SECRET: "${MUX_WEBHOOK_SECRET:-}"
      MUX_SIGNING_KEY: "${MUX_SIGNING_KEY:-}"
      MUX_PRIVATE_KEY: "${MUX_PRIVATE_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: docker/Dockerfile.client
      args:
        NEXT_PUBLIC_HOMEFLIX_API_BASE_URL: "${NEXT_PUBLIC_HOMEFLIX_API_BASE_URL:-http://localhost:4000}"
    container_name: homeflix-client
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - api

volumes:
  homeflix-postgres-data:
